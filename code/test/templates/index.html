<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gipformer Real-time STT Test</title>
  <!-- Google Fonts: Inter -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #111827 100%);
      --panel-bg: rgba(17, 24, 39, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary-glow: #6366f1;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-color: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444; /* disconnected */
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.connected {
      background: #10b981;
      box-shadow: 0 0 10px #10b981;
    }

    .panel {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      height: 350px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      font-size: 1.15rem;
      line-height: 1.7;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Custom Scrollbar */
    .panel-content::-webkit-scrollbar {
      width: 6px;
    }
    .panel-content::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .utterance-item {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border-left: 3px solid var(--accent-color);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .controls-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
    }

    .mic-button {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
      transition: all 0.3s ease;
      outline: none;
      position: relative;
    }

    .mic-button::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
      opacity: 0.4;
      z-index: -1;
      transition: transform 0.3s, opacity 0.3s;
    }

    .mic-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
    }

    .mic-button.recording {
      background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5);
    }

    .mic-button.recording::before {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    .mic-button svg {
      width: 32px;
      height: 32px;
      fill: currentColor;
    }

    .instruction {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
    }

    .log-panel {
      font-family: monospace;
      font-size: 0.8rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      max-height: 130px;
      overflow-y: auto;
      color: #93c5fd;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Gipformer STT + Silero VAD</h1>
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
    </header>

    <!-- Transcriptions Panel -->
    <div class="panel">
      <div class="panel-title">
        <span>Transcribed Speech</span>
        <span id="vadText" style="color: #60a5fa; font-size: 0.85rem;">Idle</span>
      </div>
      <div class="panel-content" id="userTranscript">
        <div style="color: var(--text-muted); font-style: italic;">Press Start and speak...</div>
      </div>
    </div>

    <!-- System Log Feedback -->
    <div class="log-panel" id="logPanel">System initialized. Click Start to begin recording audio.</div>

    <!-- Mic Controls -->
    <div class="controls-wrapper">
      <button class="mic-button" id="micBtn" title="Start microphone">
        <svg viewBox="0 0 24 24" id="micIcon">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <div class="instruction" id="instructionText">Click button to start recording</div>
    </div>
  </div>

  <script>
    const micBtn = document.getElementById('micBtn');
    const instructionText = document.getElementById('instructionText');
    const userTranscript = document.getElementById('userTranscript');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const vadText = document.getElementById('vadText');
    const logPanel = document.getElementById('logPanel');

    let socket = null;
    let audioContext = null;
    let mediaStream = null;
    let micWorkletNode = null;
    let isRecording = false;
    let hasSpeech = false;

    function addLog(msg) {
      const p = document.createElement('div');
      p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logPanel.appendChild(p);
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    async function startRecording() {
      addLog("Initializing audio capture...");
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: { ideal: 16000 },
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true
          }
        });
        
        audioContext = new AudioContext({ sampleRate: 16000 });
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        // Add PCM worklet processor
        await audioContext.audioWorklet.addModule('/static/pcmWorkletProcessor.js');
        micWorkletNode = new AudioWorkletNode(audioContext, 'pcm-worklet-processor');
        
        const source = audioContext.createMediaStreamSource(mediaStream);
        source.connect(micWorkletNode);

        // Connect WebSocket
        const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const wsUrl = wsProtocol + window.location.host + '/ws';
        socket = new WebSocket(wsUrl);
        socket.binaryType = 'arraybuffer';

        socket.onopen = () => {
          statusDot.className = 'status-dot connected';
          statusText.textContent = 'Connected';
          addLog("WebSocket connected successfully.");
          
          if (!hasSpeech) {
            userTranscript.innerHTML = "";
            hasSpeech = true;
          }
          
          // Send audio chunks to WS
          micWorkletNode.port.onmessage = ({ data }) => {
            if (socket && socket.readyState === WebSocket.OPEN) {
              socket.send(data);
            }
          };
        };

        socket.onmessage = (event) => {
          const data = JSON.parse(event.data);
          
          if (data.text) {
            // Append utterance result
            const utteranceDiv = document.createElement('div');
            utteranceDiv.className = 'utterance-item';
            utteranceDiv.textContent = data.text;
            userTranscript.appendChild(utteranceDiv);
            userTranscript.scrollTop = userTranscript.scrollHeight;
            
            addLog(`Transcription: "${data.text}"`);
          }
        };

        socket.onclose = () => {
          statusDot.className = 'status-dot';
          statusText.textContent = 'Disconnected';
          addLog("WebSocket closed.");
          stopRecording();
        };

        socket.onerror = (err) => {
          addLog(`WebSocket error: ${err}`);
        };

        micBtn.classList.add('recording');
        instructionText.textContent = 'Recording - Click to stop';
        isRecording = true;
        
      } catch (err) {
        addLog(`Error: ${err.message}`);
        console.error(err);
        stopRecording();
      }
    }

    function stopRecording() {
      addLog("Stopping audio capture...");
      if (micWorkletNode) {
        micWorkletNode.disconnect();
        micWorkletNode = null;
      }
      if (mediaStream) {
        mediaStream.getAudioTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      if (socket) {
        if (socket.readyState === WebSocket.OPEN) {
          socket.close();
        }
        socket = null;
      }

      micBtn.classList.remove('recording');
      instructionText.textContent = 'Click button to start recording';
      statusDot.className = 'status-dot';
      statusText.textContent = 'Disconnected';
      isRecording = false;
    }

    micBtn.addEventListener('click', toggleRecording);
  </script>
</body>
</html>
